# ============================================================
# AykutOnPC — CI Pipeline
# Triggers: push to main / PRs targeting main
# Jobs: build → docker-validate → (on main only) SSH deploy to Hetzner
#
# Note: No test step — owner explicit decision (2026-05-09). Quality gate
# is build success + Docker image validation + production smoke after deploy.
# ============================================================
name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:

  # ── Build ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore AykutOnPC.sln

      - name: Build (Release)
        run: dotnet build AykutOnPC.sln -c Release --no-restore

  # ── Docker Build Validation ────────────────────────────────
  docker-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          tags: aykutonpc:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Hetzner (main branch only) ──────────────────
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    needs: [build, docker-validate]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    environment: production   # Requires manual approval if configured in GitHub
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: deploy
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          port:     22
          script: |
            cd /opt/aykutonpc
            bash scripts/deploy.sh --branch ${{ github.ref_name }}
