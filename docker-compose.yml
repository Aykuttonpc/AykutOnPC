services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - GeminiSettings__ApiKey=${GEMINI_API_KEY}
      - ConnectionStrings__DefaultConnection=Host=db;Database=AykutOnPC_Db;Username=postgres;Password=${DB_PASSWORD:-DevOnlyPassword2026!}
      - SeedData__AdminUser__Password=${ADMIN_PASSWORD}
      - JwtSettings__Key=${JWT_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-DevOnlyPassword2026!}
      - POSTGRES_DB=AykutOnPC_Db
    # ⚠️ Port 5432 intentionally NOT exposed to host.
    # The web service connects via the internal Docker network.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AykutOnPC_Db"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres-data: