# ============================================================
# AykutOnPC — Production Stack (Hetzner VPS)
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ============================================================
version: '3.9'

networks:
  backend:
    driver: bridge
    internal: true       # DB & Redis NOT reachable from the host network
  frontend:
    driver: bridge       # Nginx + web app only

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-keys:
    driver: local

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aykutonpc-db
    restart: unless-stopped
    networks: [backend]
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       AykutOnPC_Db
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AykutOnPC_Db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ── Redis (Cache & Session) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aykutonpc-redis
    restart: unless-stopped
    networks: [backend]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ── .NET 9 Web Application ─────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: aykutonpc-web
    restart: unless-stopped
    networks: [backend, frontend]
    environment:
      ASPNETCORE_ENVIRONMENT:               Production
      ASPNETCORE_URLS:                      http://+:8080
      # AllowedHosts is the .NET config key (NOT ASPNETCORE_ALLOWED_HOSTS — that env var
      # name is not recognized). Behind nginx/Cloudflare we accept any Host because the
      # reverse proxy is the trust boundary. Set DOMAIN_NAME-only if you want app-side enforcement.
      AllowedHosts:                         "*"
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=AykutOnPC_Db;Username=postgres;
        Password=${DB_PASSWORD};Pooling=true;MinPoolSize=2;MaxPoolSize=20;
        CommandTimeout=30;
      ConnectionStrings__Redis:             redis:6379,password=${REDIS_PASSWORD},ssl=False,abortConnect=False
      JwtSettings__Key:                     ${JWT_SECRET_KEY}
      JwtSettings__Issuer:                  ${DOMAIN_NAME}
      JwtSettings__Audience:                ${DOMAIN_NAME}
      GeminiSettings__ApiKey:               ${GEMINI_API_KEY}
      SeedData__AdminUser__Password:        ${ADMIN_PASSWORD}
      SecuritySettings__DataProtectionPath: /app/keys
    volumes:
      - app-keys:/app/keys
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1280M
        reservations:
          cpus: '0.5'
          memory: 384M

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: aykutonpc-nginx
    restart: unless-stopped
    networks: [frontend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
        reservations:
          cpus: '0.1'
          memory: 64M
