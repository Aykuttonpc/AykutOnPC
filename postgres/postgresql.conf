# ============================================================
# AykutOnPC — PostgreSQL 16 Production Config
# Tuned for: 2-4 GB RAM VPS, SSD, single-app workload
# ============================================================

# ── Connections ──────────────────────────────────────────────
listen_addresses        = '*'           # Listen on all interfaces (Docker network)
port                    = 5432
max_connections         = 50            # App uses connection pooling (Npgsql)

# ── Memory ──────────────────────────────────────────────────
shared_buffers          = 512MB         # ~25% of 2GB RAM
effective_cache_size    = 1536MB        # ~75% of 2GB RAM
work_mem                = 16MB          # per sort/hash operation
maintenance_work_mem    = 128MB         # VACUUM, CREATE INDEX

# ── WAL & Checkpoints ───────────────────────────────────────
wal_level               = replica
max_wal_size            = 1GB
min_wal_size            = 256MB
checkpoint_completion_target = 0.9
wal_compression         = on

# ── Query Planner ────────────────────────────────────────────
random_page_cost        = 1.1           # SSD (HDD default = 4.0)
effective_io_concurrency = 200          # SSD concurrent I/O

# ── Autovacuum (aggressive for small busy tables) ───────────
autovacuum                       = on
autovacuum_vacuum_scale_factor   = 0.05
autovacuum_analyze_scale_factor  = 0.025
autovacuum_vacuum_cost_delay     = 2ms

# ── Logging ──────────────────────────────────────────────────
log_min_duration_statement  = 500       # Log queries > 500ms
log_checkpoints             = on
log_connections             = on
log_disconnections          = on
log_lock_waits              = on
log_temp_files              = 0
log_line_prefix             = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ── Timezone ─────────────────────────────────────────────────
timezone                = 'Europe/Istanbul'
log_timezone            = 'Europe/Istanbul'
