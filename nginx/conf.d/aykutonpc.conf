# ── HTTP → HTTPS Redirect + ACME Challenge ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aykutonpc.com www.aykutonpc.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aykutonpc.com www.aykutonpc.com;

    # ── TLS Certificates ─────────────────────────────────────
    # ⚠️ GEÇİCİ: Domain alınana kadar self-signed "bootstrap" cert.
    # Sunucudaki yol: /etc/letsencrypt/live/bootstrap/
    # IP-only erişim için yeterli (server_name fallback nginx default'u ile çalışır).
    #
    # Domain alındığında (örn. aykutonpc.com):
    #   1) Certbot ile gerçek cert al:
    #      sudo certbot certonly --webroot -w /var/www/certbot \
    #        -d aykutonpc.com -d www.aykutonpc.com --agree-tos
    #   2) Aşağıdaki 3 satırda "bootstrap" → "aykutonpc.com" yap
    #   3) Bu yorum bloğunu temizle, commit + push
    ssl_certificate     /etc/letsencrypt/live/bootstrap/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bootstrap/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/bootstrap/chain.pem;

    # ── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Connection Limiting ──────────────────────────────────
    limit_conn conn_limit 20;

    # ── Static Assets (immutable cache) ─────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|otf|ico|svg|png|jpg|jpeg|gif|webp)$ {
        proxy_pass http://web:8080;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Auth endpoints: strict rate limiting ─────────────────
    location ~* ^/(account/login|account/logout|api/auth) {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://web:8080;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── API endpoints ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://web:8080;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Health check (no rate limit) ─────────────────────────
    location /health {
        proxy_pass http://web:8080;
        include /etc/nginx/conf.d/proxy_params.conf;
        access_log off;
    }

    # ── Main Application ──────────────────────────────────────
    location / {
        proxy_pass http://web:8080;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Block sensitive file access ───────────────────────────
    location ~* \.(env|git|htaccess|htpasswd|sql|bak|log|yml|yaml|toml|ini)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
